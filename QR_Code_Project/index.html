<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>
  <style>
    body {
      background-color: #dce4ef;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 500px;
    }

    .img_container {
      width: 180px;
      padding: 7px 9px;
      
    }

    p {
      font-family: 'Outfit', sans-serif;
    }

    .qr_code {
      width: 100%;
      object-fit: cover;
      border-radius: 4px;
    }
    .attribution {
      background-color: white;
      width: 200px;
      font-size: 11px; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 4px;
    }
    .text {   
      text-align: center;
      padding-left: 8px;
      padding-right: 8px;
    }

    .front-end {
      font-size: 14px;
      color: hsl(218, 44%, 22%);
      font-weight: bold;
    }

    .scan_qr {
      color: hsl(220, 15%, 55%);
    }

    .challenge {
      margin-bottom: 6px;
    }

    .developer {
      margin-top: 0;
    }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="container">
    <div class="attribution">
      <div class="img_container">
        <img class="qr_code" src="images/image-qr-code.png" alt="Qr code">
      </div>
      <div class="text">
        <p class="front-end">Improve your front-end skills by building projects</p>
        <p class="scan_qr">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
      </div>
      <p class="challenge">Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a></p> 
      <p class="developer">Coded by <a href="https://github.com/matt41108-art/FirstHTMLandCSS_Project">Matt</a></p>
    </div>
  </div>
</body>
</html>
